{% extends "base.html" %}
{% block content %}
<h1>Podaj słowo nieznane litery zastąp .</h1>
<form action="" method="post" novalidate>
    {{ form.hidden_tag() }}
    <p>
        {{form.crosswordPassword.label}}<br>
        {{form.crosswordPassword(size=32)}}
    </p>
    <p>
        {{form.submit()}}
    </p>
</form>
{% endblock %}
